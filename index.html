<!DOCTYPE html>
<html>
<head>
    <title>PrimeView Real Estate</title>

    <!-- Internal CSS -->
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9; /* Not white */
            text-align: center; /* Centered content */
        }

        h1 {
            color: #1f3c88;
        }

        .container {
            width: 250px;
            background-color: white;
            border-radius: 10px;
            margin: 20px;
            display: inline-block;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
        }

        .container img {
            width: 100%;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
        }

        .container p {
            padding: 10px;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Inline CSS -->
    <h1 style="margin-top: 20px;">PrimeView Real Estate</h1>
    <p style="color: #555;">Find Your Dream Home Today</p>

    <div class="main-content">

        <!-- Image Container 1 -->
        <div class="container">
            <img src="https://via.placeholder.com/250x150" alt="House 1">
            <p>Luxury Villa - $500,000</p>
        </div>

        <!-- Image Container 2 -->
        <div class="container">
            <img src="https://via.placeholder.com/250x150" alt="House 2">
            <p>Modern Apartment - $300,000</p>
        </div>

        <!-- Image Container 3 -->
        <div class="container">
            <img src="https://via.placeholder.com/250x150" alt="House 3">
            <p>Family Home - $250,000</p>
        </div>

        <!-- Image Container 4 -->
        <div class="container">
            <img src="https://via.placeholder.com/250x150" alt="House 4">
            <p>Beach House - $750,000</p>
        </div>

        <!-- Image Container 5 -->
        <div class="container">
            <img src="https://via.placeholder.com/250x150" alt="House 5">
            <p>Town House - $400,000</p>
        </div>

    </div>

</body>
</html>
